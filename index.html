<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CraveCheck</title>
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body>
    <div id="app">
      <!-- Splash View -->
      <div id="splash-view" class="splash-container">
        <h1 class="splash-title">CraveCheck</h1>
        <h2 class="splash-subtitle">Select your age group to begin the simulation</h2>
        
        <select id="age-selector" class="age-selector">
          <option value="under18">Under 18</option>
          <option value="18-24">18-24</option>
          <option value="25-34">25-34</option>
          <option value="35-44">35-44</option>
          <option value="45+">45+</option>
        </select>
        
        <button id="start-btn" class="btn-primary">Start Scrolling</button>
      </div>

      <!-- Dummy Feed View -->
      <div id="feed-view" style="display: none;">
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
